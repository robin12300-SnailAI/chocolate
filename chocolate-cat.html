<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>巧克力</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f5e6d3, #d4a574);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      background: white;
      padding: 60px 80px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 600px;
    }
    .cat-emoji {
      font-size: 100px;
      margin-bottom: 30px;
    }
    .text {
      font-size: 32px;
      color: #333;
      line-height: 1.6;
      font-weight: 500;
    }
    .breed {
      font-size: 24px;
      color: #8b6914;
      margin-top: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="cat-emoji">🐱</div>
    <div class="text">巧克力是一只可爱的猫</div>
    <div class="breed">品种：缅甸猫</div>
  </div>
</body>
</html>
